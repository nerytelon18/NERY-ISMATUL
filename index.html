<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags requeridos para PWA en iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B2447">
    
    <title>Mi PWA - Nery Ismatul</title>
    
    <!-- Link para inyectar el Manifest PWA dinámicamente -->
    <link rel="manifest" id="manifest-link">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { galileo: { blue: '#0B2447', accent: '#FF6B00' } }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f1115;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 1rem;
        }

        .mobile-container {
            width: 100%; max-width: 400px; height: 850px; max-height: 95vh;
            background-color: transparent; border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 8px #222;
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        /* FONDO PERSONALIZADO (Requisito E) */
        #app-bg {
            position: absolute; inset: -5%; width: 110%; height: 110%;
            /* Integración creativa: Gradiente tipo viñeta que permite ver la foto en la parte superior y se aclara hacia abajo para los botones */
            background-image: linear-gradient(to bottom, rgba(11, 36, 71, 0.45) 0%, rgba(255, 255, 255, 0.1) 30%, rgba(245, 247, 250, 0.98) 75%), url('papa julio.jpg');
            background-size: cover; background-position: center 25%;
            z-index: 0; will-change: transform;
        }

        /* SECCIONES VISUALMENTE CLARAS (Requisito A) */
        .seccion-uno {
            background: rgba(11, 36, 71, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20; padding: 1.5rem; border-top-left-radius: 2.5rem; border-top-right-radius: 2.5rem;
        }

        .seccion-dos {
            flex: 1; overflow-y: auto; z-index: 10; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem; justify-content: center;
        }

        .seccion-tres {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            border-top: 2px solid rgba(11, 36, 71, 0.1);
            z-index: 20; padding: 1.5rem; padding-bottom: 2rem;
            border-bottom-left-radius: 2.5rem; border-bottom-right-radius: 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .action-button {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .action-button:active { transform: scale(0.96); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <main class="mobile-container">
        
        <!-- Fondo Fotográfico -->
        <div id="app-bg"></div>

        <!-- ============================== -->
        <!-- SECCIÓN UNO: Encabezado y Voz  -->
        <!-- ============================== -->
        <header class="seccion-uno shadow-sm relative">
            <div class="flex justify-between items-center mb-4 mt-2">
                <div>
                    <p class="text-xs font-bold text-orange-400 tracking-widest uppercase">PWA - Tareas</p>
                    <h1 class="text-2xl font-extrabold text-white">Mi App Web</h1>
                </div>
                <!-- Botón de Texto a Voz (Requisito B) -->
                <button onclick="leerTextoVoz()" class="action-button w-12 h-12 rounded-full bg-white/20 text-white flex justify-center items-center shadow-inner hover:bg-white/30 border border-white/30 backdrop-blur-md">
                    <i class="fa-solid fa-volume-high text-xl"></i>
                </button>
            </div>
            <p class="text-sm text-gray-200">Presiona el botón para escuchar la bienvenida.</p>
        </header>

        <!-- ============================== -->
        <!-- SECCIÓN DOS: Botones Interact. -->
        <!-- ============================== -->
        <section class="seccion-dos hide-scroll relative">
            
            <!-- Botón 1: Wix -->
            <a href="https://robertotelon.wixsite.com/tarea12y25000701" target="_blank" onclick="showToast('Redirigiendo a sitio Wix...')" class="action-button bg-white rounded-2xl p-5 flex items-center gap-4 shadow-md border border-purple-100 group">
                <div class="w-14 h-14 bg-purple-50 rounded-xl flex justify-center items-center shrink-0 border border-purple-200 group-hover:scale-105 transition-transform">
                    <i class="fa-brands fa-wix text-3xl text-purple-600"></i>
                </div>
                <div class="flex-1">
                    <h2 class="font-bold text-gray-800 text-lg">Mi Sitio Web (Wix)</h2>
                    <p class="text-xs text-purple-600 font-medium">Tarea 12 - Proyecto Final</p>
                </div>
                <i class="fa-solid fa-arrow-right text-gray-300 group-hover:text-purple-600 transition-colors"></i>
            </a>

            <!-- Botón 2: YouTube -->
            <a href="https://www.youtube.com/watch?v=zF4deosVHx8" target="_blank" onclick="showToast('Abriendo video de YouTube...')" class="action-button bg-white rounded-2xl p-5 flex items-center gap-4 shadow-md border border-red-100 group">
                <div class="w-14 h-14 bg-red-50 rounded-xl flex justify-center items-center shrink-0 border border-red-200 group-hover:scale-105 transition-transform">
                    <i class="fa-brands fa-youtube text-3xl text-red-600"></i>
                </div>
                <div class="flex-1">
                    <h2 class="font-bold text-gray-800 text-lg">Mi Video (YouTube)</h2>
                    <p class="text-xs text-red-600 font-medium">Tarea 11 - Exposición</p>
                </div>
                <i class="fa-solid fa-arrow-right text-gray-300 group-hover:text-red-600 transition-colors"></i>
            </a>

            <!-- Botón 3: Universidad Galileo -->
            <a href="https://www.galileo.edu/" target="_blank" onclick="showToast('Visitando U. Galileo...')" class="action-button bg-white rounded-2xl p-5 flex items-center gap-4 shadow-md border border-blue-100 group">
                <!-- Imagen/Logo de la Institución a la par -->
                <div class="w-14 h-14 bg-white rounded-xl flex justify-center items-center shrink-0 shadow-sm border border-gray-200 group-hover:scale-105 transition-transform overflow-hidden p-1">
                    <img src="https://www.galileo.edu/wp-content/themes/galileo-theme/img/logo-galileo.png" alt="Logo Galileo" class="w-full h-full object-contain">
                </div>
                <div class="flex-1">
                    <h2 class="font-bold text-gray-800 text-lg">Univ. Galileo</h2>
                    <p class="text-xs text-blue-600 font-medium">Página Principal</p>
                </div>
                <i class="fa-solid fa-arrow-right text-gray-300 group-hover:text-galileo-blue transition-colors"></i>
            </a>

        </section>

        <!-- ============================== -->
        <!-- SECCIÓN TRES: Canvas y Salir   -->
        <!-- ============================== -->
        <footer class="seccion-tres relative shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            
            <!-- Canvas Apellido (Requisito D) -->
            <div class="flex flex-col">
                <span class="text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Estudiante:</span>
                <!-- Elemento Canvas -->
                <canvas id="apellidoCanvas" width="160" height="40" class="border border-dashed border-gray-300 rounded-lg bg-white/50"></canvas>
            </div>

            <!-- Botón de Salir (Requisito D) -->
            <button onclick="salirApp()" class="action-button flex items-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-2.5 px-5 rounded-xl border border-red-200 transition-colors">
                <span>Salir</span>
                <i class="fa-solid fa-power-off"></i>
            </button>
            
        </footer>

        <!-- Toast de Notificación -->
        <div id="toast" class="absolute top-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl font-medium text-sm transition-all duration-500 transform -translate-y-20 opacity-0 z-[100] flex items-center gap-2">
            <i class="fa-solid fa-bell text-galileo-accent"></i>
            <span id="toast-msg">Notificación</span>
        </div>

    </main>

    <!-- SCRIPTS MÁGICOS LÓGICOS (Requisito F) -->
    <script>
        // ==========================================
        // 1. LÓGICA DE TEXTO A VOZ (Web Speech API)
        // ==========================================
        function leerTextoVoz() {
            if ('speechSynthesis' in window) {
                // Cancelar audios anteriores si se presiona rápido
                window.speechSynthesis.cancel(); 

                const texto = "¡Qué alegría tenerte con nosotros! Nuestro equipo está aquí para apoyarte a alcanzar tus objetivos. Prepárate para una experiencia diseñada para hacer tu vida más fácil.";
                const mensaje = new SpeechSynthesisUtterance(texto);
                
                // Obtener las voces disponibles en el dispositivo/navegador
                const voces = window.speechSynthesis.getVoices();
                
                // Intentar buscar una voz masculina específica en Español Latinoamericano (cualquier variante que no sea de España)
                let vozHombreLatino = voces.find(voz => 
                    voz.lang.startsWith('es-') && !voz.lang.includes('es-ES') && 
                    (voz.name.toLowerCase().includes('male') || voz.name.toLowerCase().includes('hombre') || 
                     voz.name.includes('Juan') || voz.name.includes('Raul') || voz.name.includes('Diego') || voz.name.includes('Carlos'))
                );

                // Si no hay voz explícitamente masculina, buscar cualquier voz latina
                let vozLatina = voces.find(voz => voz.lang.startsWith('es-') && !voz.lang.includes('es-ES'));

                // Asignar la mejor voz disponible
                if (vozHombreLatino) {
                    mensaje.voice = vozHombreLatino;
                } else if (vozLatina) {
                    mensaje.voice = vozLatina;
                }
                
                // Fallback general del idioma a Latino genérico
                mensaje.lang = 'es-MX'; // 'es-MX' es el estándar más común para español latinoamericano en los navegadores
                
                // Configuración de la voz (bajamos el tono para asegurar que suene más a hombre)
                mensaje.rate = 1.0;     // Velocidad normal
                mensaje.pitch = 0.7;    // Tono más grave (0.7 simula una voz masculina incluso en voces femeninas/neutras)
                
                window.speechSynthesis.speak(mensaje);
                showToast("Reproduciendo audio de bienvenida...");
            } else {
                showToast("Tu navegador no soporta Síntesis de Voz.");
            }
        }

        // ==========================================
        // 2. LÓGICA DE CANVAS DINÁMICO
        // ==========================================
        function dibujarApellidoEnCanvas() {
            const canvas = document.getElementById('apellidoCanvas');
            const ctx = canvas.getContext('2d');
            
            // Limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Estilo del texto
            ctx.font = 'bold 24px Outfit, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Crear degradado (Colores Galileo: Azul a Naranja)
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, "#0B2447"); // Azul Galileo
            gradient.addColorStop(1, "#FF6B00"); // Naranja Galileo
            
            ctx.fillStyle = gradient;
            
            // Dibujar el primer apellido en el centro del canvas
            ctx.fillText("ISMATUL", canvas.width / 2, canvas.height / 2 + 2);
        }

        // ==========================================
        // 3. LÓGICA DE APP & UI
        // ==========================================
        function salirApp() {
            showToast("Cerrando aplicación...");
            // Siendo una web, simular cierre ocultando la app
            setTimeout(() => {
                document.querySelector('.mobile-container').style.opacity = '0.5';
                document.querySelector('.mobile-container').style.filter = 'grayscale(100%)';
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3500);
        }

        // ==========================================
        // 4. LÓGICA PWA (Manifest & Service Worker)
        // ==========================================
        function configurarPWA() {
            // A) Generar y adjuntar Manifest dinámico (permite a Android/Chrome "Instalar" la app)
            const manifest = {
                "name": "App Tareas Galileo",
                "short_name": "App Nery",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#0B2447",
                "theme_color": "#0B2447",
                "description": "Aplicación de tareas para la Universidad",
                "icons": [{
                    "src": "https://cdn-icons-png.flaticon.com/512/2232/2232688.png",
                    "sizes": "512x512",
                    "type": "image/png"
                }]
            };
            const manifestString = JSON.stringify(manifest);
            document.getElementById('manifest-link').setAttribute('href', 'data:application/json;charset=utf-8,' + encodeURIComponent(manifestString));

            // B) Registrar un Service Worker básico vía Blob (Truco para PWA de 1 archivo)
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => { self.skipWaiting(); });
                    self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
                    self.addEventListener('fetch', (e) => { /* Bypass para PWA offline básica */ });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(() => console.log('PWA: Service Worker Registrado Exitosamente'))
                    .catch(err => console.log('PWA: Error al registrar SW', err));
            }
        }

        // ==========================================
        // INICIALIZADOR AL CARGAR LA PÁGINA
        // ==========================================
        window.onload = () => {
            dibujarApellidoEnCanvas();
            configurarPWA();
        };

    </script>
</body>
</html>
